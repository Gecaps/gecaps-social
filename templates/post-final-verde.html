<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; }

  .post {
    width: 1080px; height: 1350px;
    background: linear-gradient(170deg, #1B5E20 0%, #2E7D32 35%, #388E3C 65%, #2E7D32 100%);
    font-family: 'Inter', sans-serif;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }

  .top-bar { height: 5px; background: linear-gradient(90deg, rgba(255,255,255,0.1), rgba(255,255,255,0.4), rgba(255,255,255,0.1)); }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 40px 64px 0;
  }
  .logo-img { height: 38px; filter: brightness(0) invert(1); }
  .badge {
    font-size: 12px; font-weight: 700; color: #2E7D32;
    background: #fff; padding: 8px 24px;
    border-radius: 100px; letter-spacing: 2px; text-transform: uppercase;
  }

  .content { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 64px; z-index: 2; }

  .tags { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.6); letter-spacing: 5px; text-transform: uppercase; margin-bottom: 18px; }

  .bar { width: 56px; height: 4px; background: rgba(255,255,255,0.5); border-radius: 2px; margin-bottom: 32px; }

  .title {
    font-size: 60px; font-weight: 800; color: #fff;
    line-height: 1.1; margin-bottom: 24px; letter-spacing: -1.5px;
  }
  .title .hl {
    color: #2E7D32; background: #fff;
    padding: 2px 16px 6px; border-radius: 8px;
    box-decoration-break: clone; -webkit-box-decoration-break: clone; white-space: nowrap;
  }

  .subtitle { font-size: 22px; font-weight: 400; color: rgba(255,255,255,0.75); line-height: 1.55; max-width: 750px; margin-bottom: 36px; }

  .cta {
    display: inline-flex; align-items: center; gap: 12px;
    font-size: 15px; font-weight: 700; color: #fff;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 16px 32px; border: 2.5px solid rgba(255,255,255,0.5); border-radius: 100px;
    width: fit-content;
  }

  .footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 64px 44px; z-index: 2;
  }
  .handle { font-size: 17px; font-weight: 700; color: rgba(255,255,255,0.9); }
  .footer-right { font-size: 13px; color: rgba(255,255,255,0.45); letter-spacing: 1px; }

  /* Big number */
  .big-num {
    position: absolute; right: 30px; top: 280px;
    font-size: 400px; font-weight: 900; color: rgba(255,255,255,0.05);
    line-height: 1; z-index: 1; letter-spacing: -15px;
  }

  /* Decorações */
  .deco-a { position: absolute; top: -80px; right: -80px; width: 320px; height: 320px; border-radius: 50%; border: 50px solid rgba(255,255,255,0.04); z-index: 1; }
  .deco-b { position: absolute; bottom: 130px; right: 40px; width: 200px; height: 200px; border-radius: 50%; background: rgba(255,255,255,0.03); z-index: 1; }
  .deco-c { position: absolute; top: 230px; left: -70px; width: 160px; height: 160px; border-radius: 50%; background: rgba(255,255,255,0.03); z-index: 1; }
  .deco-line { position: absolute; right: 64px; top: 120px; width: 3px; height: 160px; background: linear-gradient(180deg, rgba(255,255,255,0.15), transparent); border-radius: 2px; z-index: 1; }
  .deco-dots { position: absolute; bottom: 280px; left: 64px; display: flex; gap: 8px; z-index: 1; }
  .deco-dots span { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.1); }
  .deco-dots span:first-child { opacity: 0.3; width: 8px; height: 8px; }

  /* Folha decorativa */
  .leaf {
    position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
    width: 60px; height: 60px; opacity: 0.04; z-index: 1;
  }
  .leaf svg { width: 100%; height: 100%; }
</style>
</head>
