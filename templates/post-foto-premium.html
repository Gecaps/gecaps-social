<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; }

  .post {
    width: 1080px; height: 1350px;
    font-family: 'Inter', sans-serif;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }

  .bg {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background-size: cover; background-position: center top;
  }

  .overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(
      180deg,
      rgba(27,94,32,0.0) 0%,
      rgba(27,94,32,0.05) 20%,
      rgba(27,94,32,0.3) 40%,
      rgba(27,94,32,0.75) 55%,
      rgba(27,94,32,0.92) 70%,
      rgba(21,71,24,0.97) 100%
    );
  }

  .overlay-top {
    position: absolute; top: 0; left: 0; width: 100%; height: 120px;
    background: linear-gradient(180deg, rgba(21,71,24,0.6) 0%, transparent 100%);
  }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 36px 60px 0;
    position: relative; z-index: 3;
  }
  .brand { font-size: 28px; font-weight: 800; color: #fff; letter-spacing: 2px; }
  .badge {
    font-size: 11px; font-weight: 700; color: #1B5E20;
    background: rgba(255,255,255,0.92); padding: 7px 20px;
    border-radius: 100px; letter-spacing: 2px; text-transform: uppercase;
  }

  .content {
    flex: 1; display: flex; flex-direction: column; justify-content: flex-end;
    padding: 0 60px;
    position: relative; z-index: 3;
  }

  .tags {
    font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.45);
    letter-spacing: 5px; text-transform: uppercase; margin-bottom: 14px;
  }

  .bar { width: 48px; height: 3px; background: #66BB6A; border-radius: 2px; margin-bottom: 24px; }

  .title {
    font-size: 52px; font-weight: 800; color: #fff;
    line-height: 1.12; margin-bottom: 18px; letter-spacing: -1px;
  }
  .title .hl {
    color: #1B5E20; background: rgba(255,255,255,0.95);
    padding: 2px 14px 5px; border-radius: 7px;
    box-decoration-break: clone; -webkit-box-decoration-break: clone; white-space: nowrap;
  }

  .subtitle {
    font-size: 20px; font-weight: 400; color: rgba(255,255,255,0.65);
    line-height: 1.5; max-width: 680px; margin-bottom: 28px;
  }

  .cta {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 13px; font-weight: 700; color: #fff;
    letter-spacing: 1.5px; text-transform: uppercase;
    padding: 14px 28px; border: 2px solid rgba(255,255,255,0.3);
    border-radius: 100px; width: fit-content;
    background: rgba(255,255,255,0.06);
    margin-bottom: 70px;
  }

  .footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 60px 40px;
    position: relative; z-index: 3;
  }
  .handle { font-size: 16px; font-weight: 700; color: #66BB6A; }
  .footer-right { font-size: 12px; color: rgba(255,255,255,0.3); letter-spacing: 1px; }

  .deco {
    position: absolute; bottom: 200px; right: -40px;
    width: 200px; height: 200px; border-radius: 50%;
    border: 40px solid rgba(255,255,255,0.03);
    z-index: 2;
  }
</style>
</head>
<body>
<div class="post">
  <div class="bg" style="background-image: url('{{IMAGE_URL}}')"></div>
  <div class="overlay"></div>
  <div class="overlay-top"></div>
  <div class="deco"></div>

  <div class="header">
    <span class="brand">GECAPS</span>
    <div class="badge">Produto</div>
  </div>

  <div class="content">
    <div class="tags">SKINCARE · FORMULACAO · MARCA PROPRIA</div>
    <div class="bar"></div>
    <h1 class="title">O mesmo ingrediente. Duas formulacoes. <span class="hl">Resultados diferentes.</span></h1>
    <p class="subtitle">Por que a formulacao importa mais que o ingrediente</p>
    <div class="cta">Siga para mais conteudo <span>→</span></div>
  </div>

  <div class="footer">
    <span class="handle">@gecapsbrasil</span>
    <span class="footer-right">GECAPS · Cosmeticos & Suplementos</span>
  </div>
</div>
</body>
</html>
